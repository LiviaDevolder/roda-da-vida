<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roda da Vida — Mentoria de Carreira</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0F1117;
    --surface: #1A1D27;
    --surface-hover: #232733;
    --border: #2A2E3B;
    --text: #E8E9ED;
    --text-muted: #8B8FA3;
    --accent: #6C63FF;
    --accent-glow: rgba(108, 99, 255, 0.25);
    --accent-soft: rgba(108, 99, 255, 0.08);
    --warm: #FF8C42;
    --warm-glow: rgba(255, 140, 66, 0.25);
    --teal: #2DD4BF;
    --teal-glow: rgba(45, 212, 191, 0.25);
    --rose: #F472B6;
    --red: #EF4444;
    --green: #34D399;
    --radius: 16px;
    --radius-sm: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .noise-overlay {
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0;
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 40px 24px 80px;
    position: relative; z-index: 1;
  }

  header {
    text-align: center;
    margin-bottom: 48px;
    animation: fadeUp 0.8s ease;
  }

  header .badge {
    display: inline-block;
    padding: 6px 16px;
    background: var(--accent-soft);
    border: 1px solid rgba(108, 99, 255, 0.2);
    border-radius: 100px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 20px;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(32px, 5vw, 52px);
    font-weight: 800;
    line-height: 1.15;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--text), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 12px;
  }

  header p {
    color: var(--text-muted);
    font-size: 16px;
    max-width: 500px;
    margin: 0 auto;
    line-height: 1.6;
  }

  /* Tab navigation */
  .tabs {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 40px;
    animation: fadeUp 0.8s ease 0.1s both;
  }

  .tab-btn {
    padding: 12px 28px;
    border: 1px solid var(--border);
    border-radius: 100px;
    background: var(--surface);
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .tab-btn:hover { border-color: var(--accent); color: var(--text); }

  .tab-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
    box-shadow: 0 4px 20px var(--accent-glow);
  }

  /* Wheel panels */
  .wheel-panel { display: none; animation: fadeUp 0.5s ease; }
  .wheel-panel.active { display: block; }

  .wheel-layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 40px;
    align-items: start;
  }

  @media (max-width: 900px) {
    .wheel-layout { grid-template-columns: 1fr; }
  }

  /* Canvas container */
  .canvas-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    overflow: hidden;
  }

  .canvas-wrap::before {
    content: '';
    position: absolute;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(circle at center, var(--accent-glow) 0%, transparent 50%);
    opacity: 0.15;
    pointer-events: none;
  }

  .canvas-wrap canvas {
    width: 100%;
    max-width: 420px;
    height: auto;
    position: relative;
    z-index: 1;
  }

  .average-score {
    margin-top: 20px;
    text-align: center;
    position: relative; z-index: 1;
  }

  .average-score .label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-muted);
    margin-bottom: 4px;
  }

  .average-score .value {
    font-family: 'Playfair Display', serif;
    font-size: 48px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--teal));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  /* Sliders */
  .sliders-panel {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .slider-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 16px 20px;
    transition: all 0.3s ease;
  }

  .slider-card:hover {
    border-color: var(--accent);
    background: var(--surface-hover);
  }

  .slider-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }

  .slider-label {
    font-weight: 600;
    font-size: 14px;
    color: var(--text);
  }

  .slider-value {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    font-weight: 700;
    min-width: 36px;
    text-align: right;
    transition: color 0.3s;
  }

  .slider-wrap {
    position: relative;
    height: 8px;
  }

  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 8px;
    border-radius: 4px;
    outline: none;
    cursor: pointer;
    position: relative;
    z-index: 2;
    background: transparent;
  }

  .slider-track {
    position: absolute;
    top: 0; left: 0;
    height: 8px;
    border-radius: 4px;
    width: 100%;
    background: var(--border);
    z-index: 0;
  }

  .slider-fill {
    position: absolute;
    top: 0; left: 0;
    height: 8px;
    border-radius: 4px;
    z-index: 1;
    transition: width 0.15s ease, background 0.3s ease;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 22px; height: 22px;
    border-radius: 50%;
    background: white;
    border: 3px solid var(--accent);
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    cursor: grab;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }

  input[type="range"]::-webkit-slider-thumb:hover {
    transform: scale(1.15);
    box-shadow: 0 2px 16px var(--accent-glow);
  }

  input[type="range"]::-moz-range-thumb {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: white;
    border: 3px solid var(--accent);
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    cursor: grab;
  }

  /* Score colors */
  .score-low { color: var(--red); }
  .score-mid { color: var(--warm); }
  .score-high { color: var(--green); }

  /* Reset button */
  .reset-bar {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-top: 32px;
  }

  .btn {
    padding: 10px 24px;
    border-radius: 100px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
  }

  .btn:hover { border-color: var(--accent); color: var(--text); }

  .btn-accent {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  .btn-accent:hover {
    box-shadow: 0 4px 20px var(--accent-glow);
    transform: translateY(-1px);
  }

  /* Summary section */
  .summary-section {
    margin-top: 48px;
    animation: fadeUp 0.8s ease 0.2s both;
  }

  .summary-title {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 700;
    text-align: center;
    margin-bottom: 24px;
    color: var(--text);
  }

  .summary-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  @media (max-width: 700px) { .summary-grid { grid-template-columns: 1fr; } }

  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
  }

  .summary-card h3 {
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    margin-bottom: 16px;
  }

  .summary-card .items { display: flex; flex-direction: column; gap: 10px; }

  .summary-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 14px;
  }

  .summary-item.critical { background: rgba(239, 68, 68, 0.08); }
  .summary-item.growth { background: rgba(255, 140, 66, 0.08); }
  .summary-item.strong { background: rgba(52, 211, 153, 0.08); }

  .summary-item .name { font-weight: 500; }
  .summary-item .score { font-weight: 700; font-family: 'Playfair Display', serif; font-size: 18px; }

  /* Note area */
  .notes-section {
    margin-top: 40px;
    animation: fadeUp 0.8s ease 0.3s both;
  }

  .notes-section textarea {
    width: 100%;
    min-height: 140px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 20px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    line-height: 1.7;
    resize: vertical;
    outline: none;
    transition: border-color 0.3s;
  }

  .notes-section textarea:focus { border-color: var(--accent); }

  .notes-section textarea::placeholder { color: var(--text-muted); }

  .notes-label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-muted);
    margin-bottom: 10px;
    display: block;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="noise-overlay"></div>

<div class="container">
  <header>
    <div class="badge">Mentoria de Carreira 2026</div>
    <h1>Roda da Vida</h1>
    <p>Avalie cada área de 0 a 10. Seja honesto — o objetivo é clareza, não perfeição.</p>
  </header>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('geral')">Vida Geral</button>
    <button class="tab-btn" onclick="switchTab('carreira')">Carreira Tech</button>
  </div>

  <!-- RODA GERAL -->
  <div class="wheel-panel active" id="panel-geral">
    <div class="wheel-layout">
      <div class="canvas-wrap">
        <canvas id="canvas-geral" width="420" height="420"></canvas>
        <div class="average-score">
          <div class="label">Média Geral</div>
          <div class="value" id="avg-geral">0.0</div>
        </div>
      </div>
      <div class="sliders-panel" id="sliders-geral"></div>
    </div>
  </div>

  <!-- RODA CARREIRA -->
  <div class="wheel-panel" id="panel-carreira">
    <div class="wheel-layout">
      <div class="canvas-wrap">
        <canvas id="canvas-carreira" width="420" height="420"></canvas>
        <div class="average-score">
          <div class="label">Média Carreira</div>
          <div class="value" id="avg-carreira">0.0</div>
        </div>
      </div>
      <div class="sliders-panel" id="sliders-carreira"></div>
    </div>
  </div>

  <div class="reset-bar">
    <button class="btn" onclick="resetAll()">Resetar Tudo</button>
  </div>

  <!-- SUMMARY -->
  <div class="summary-section">
    <div class="summary-title">Diagnóstico Rápido</div>
    <div class="summary-grid">
      <div class="summary-card">
        <h3>Áreas Críticas (0–3)</h3>
        <div class="items" id="critical-items"><span style="color:var(--text-muted);font-size:13px;">Mova os sliders para ver o diagnóstico</span></div>
      </div>
      <div class="summary-card">
        <h3>Áreas com Potencial (4–6)</h3>
        <div class="items" id="growth-items"><span style="color:var(--text-muted);font-size:13px;">—</span></div>
      </div>
    </div>
  </div>

  <!-- NOTES -->
  <div class="notes-section">
    <label class="notes-label">Anotações da mentora</label>
    <textarea placeholder="Use este espaço para anotar observações, reações dele durante o exercício, insights que surgirem..."></textarea>
  </div>
</div>

<script>
const WHEELS = {
  geral: {
    categories: [
      { name: "Saúde Física", emoji: "💪" },
      { name: "Saúde Mental", emoji: "🧠" },
      { name: "Carreira", emoji: "💼" },
      { name: "Finanças", emoji: "💰" },
      { name: "Relacionamento", emoji: "❤️" },
      { name: "Família", emoji: "👨‍👩‍👦" },
      { name: "Vida Social", emoji: "🤝" },
      { name: "Lazer", emoji: "🎮" },
      { name: "Desenvolvimento Pessoal", emoji: "📚" },
      { name: "Espiritualidade", emoji: "✨" },
    ],
    values: [],
    canvas: null,
    ctx: null,
  },
  carreira: {
    categories: [
      { name: "Portfólio / GitHub", emoji: "📂" },
      { name: "Formação / Estudos", emoji: "🎓" },
      { name: "Habilidades Técnicas", emoji: "⚙️" },
      { name: "Posicionamento (LinkedIn/CV)", emoji: "📋" },
      { name: "Networking / Comunidade", emoji: "🌐" },
      { name: "Constância / Disciplina", emoji: "🔁" },
      { name: "Clareza de Objetivo", emoji: "🎯" },
      { name: "Projetos Práticos", emoji: "🛠️" },
      { name: "Preparação p/ Seletivos", emoji: "🏆" },
      { name: "Autoconhecimento Profissional", emoji: "🪞" },
    ],
    values: [],
    canvas: null,
    ctx: null,
  },
};

let activeTab = 'geral';

function getScoreColor(val) {
  if (val <= 3) return '#EF4444';
  if (val <= 6) return '#FF8C42';
  return '#34D399';
}

function getScoreClass(val) {
  if (val <= 3) return 'score-low';
  if (val <= 6) return 'score-mid';
  return 'score-high';
}

function initWheel(key) {
  const wheel = WHEELS[key];
  wheel.values = new Array(wheel.categories.length).fill(0);
  wheel.canvas = document.getElementById(`canvas-${key}`);
  wheel.ctx = wheel.canvas.getContext('2d');

  const dpr = window.devicePixelRatio || 1;
  wheel.canvas.width = 420 * dpr;
  wheel.canvas.height = 420 * dpr;
  wheel.ctx.scale(dpr, dpr);

  const container = document.getElementById(`sliders-${key}`);
  container.innerHTML = '';

  wheel.categories.forEach((cat, i) => {
    const card = document.createElement('div');
    card.className = 'slider-card';
    card.innerHTML = `
      <div class="slider-top">
        <span class="slider-label">${cat.emoji} ${cat.name}</span>
        <span class="slider-value score-low" id="val-${key}-${i}">0</span>
      </div>
      <div class="slider-wrap">
        <div class="slider-track"></div>
        <div class="slider-fill" id="fill-${key}-${i}" style="width:0%;background:${getScoreColor(0)}"></div>
        <input type="range" min="0" max="10" value="0" id="slider-${key}-${i}"
          oninput="updateValue('${key}', ${i}, this.value)">
      </div>
    `;
    container.appendChild(card);
  });

  drawWheel(key);
}

function updateValue(key, index, val) {
  val = parseInt(val);
  WHEELS[key].values[index] = val;

  const display = document.getElementById(`val-${key}-${index}`);
  display.textContent = val;
  display.className = `slider-value ${getScoreClass(val)}`;

  const fill = document.getElementById(`fill-${key}-${index}`);
  fill.style.width = `${val * 10}%`;
  fill.style.background = getScoreColor(val);

  drawWheel(key);
  updateAverage(key);
  updateSummary();
}

function drawWheel(key) {
  const wheel = WHEELS[key];
  const ctx = wheel.ctx;
  const cx = 210, cy = 210, maxR = 175;
  const n = wheel.categories.length;
  const angleStep = (2 * Math.PI) / n;
  const startAngle = -Math.PI / 2;

  ctx.clearRect(0, 0, 420, 420);

  // Grid rings
  for (let r = 1; r <= 10; r++) {
    const radius = (r / 10) * maxR;
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, 2 * Math.PI);
    ctx.strokeStyle = r === 5 ? 'rgba(108, 99, 255, 0.15)' : 'rgba(255,255,255,0.04)';
    ctx.lineWidth = r === 5 ? 1.5 : 0.8;
    ctx.stroke();
  }

  // Grid lines
  for (let i = 0; i < n; i++) {
    const angle = startAngle + i * angleStep;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + Math.cos(angle) * maxR, cy + Math.sin(angle) * maxR);
    ctx.strokeStyle = 'rgba(255,255,255,0.05)';
    ctx.lineWidth = 0.8;
    ctx.stroke();
  }

  // Filled area
  const values = wheel.values;
  if (values.some(v => v > 0)) {
    // Glow
    ctx.beginPath();
    for (let i = 0; i < n; i++) {
      const angle = startAngle + i * angleStep;
      const r = (values[i] / 10) * maxR;
      const x = cx + Math.cos(angle) * r;
      const y = cy + Math.sin(angle) * r;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.closePath();
    const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, maxR);
    glow.addColorStop(0, 'rgba(108, 99, 255, 0.2)');
    glow.addColorStop(1, 'rgba(45, 212, 191, 0.08)');
    ctx.fillStyle = glow;
    ctx.fill();

    // Border
    ctx.beginPath();
    for (let i = 0; i < n; i++) {
      const angle = startAngle + i * angleStep;
      const r = (values[i] / 10) * maxR;
      const x = cx + Math.cos(angle) * r;
      const y = cy + Math.sin(angle) * r;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.closePath();
    const grad = ctx.createLinearGradient(cx - maxR, cy - maxR, cx + maxR, cy + maxR);
    grad.addColorStop(0, '#6C63FF');
    grad.addColorStop(1, '#2DD4BF');
    ctx.strokeStyle = grad;
    ctx.lineWidth = 2.5;
    ctx.stroke();

    // Dots
    for (let i = 0; i < n; i++) {
      const angle = startAngle + i * angleStep;
      const r = (values[i] / 10) * maxR;
      const x = cx + Math.cos(angle) * r;
      const y = cy + Math.sin(angle) * r;
      ctx.beginPath();
      ctx.arc(x, y, 5, 0, 2 * Math.PI);
      ctx.fillStyle = getScoreColor(values[i]);
      ctx.fill();
      ctx.strokeStyle = '#0F1117';
      ctx.lineWidth = 2;
      ctx.stroke();
    }
  }

  // Labels
  ctx.font = '500 11px DM Sans';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  for (let i = 0; i < n; i++) {
    const angle = startAngle + i * angleStep;
    const lR = maxR + 24;
    const x = cx + Math.cos(angle) * lR;
    const y = cy + Math.sin(angle) * lR;

    const name = wheel.categories[i].name;
    const words = name.split(' ');
    ctx.fillStyle = values[i] > 0 ? getScoreColor(values[i]) : 'rgba(255,255,255,0.4)';

    if (words.length <= 2) {
      ctx.fillText(name, x, y);
    } else {
      const mid = Math.ceil(words.length / 2);
      ctx.fillText(words.slice(0, mid).join(' '), x, y - 7);
      ctx.fillText(words.slice(mid).join(' '), x, y + 7);
    }
  }
}

function updateAverage(key) {
  const vals = WHEELS[key].values;
  const sum = vals.reduce((a, b) => a + b, 0);
  const avg = (sum / vals.length).toFixed(1);
  document.getElementById(`avg-${key}`).textContent = avg;
}

function updateSummary() {
  const allItems = [];
  ['geral', 'carreira'].forEach(key => {
    WHEELS[key].categories.forEach((cat, i) => {
      const v = WHEELS[key].values[i];
      if (v > 0) {
        allItems.push({ name: `${cat.emoji} ${cat.name}`, score: v, wheel: key === 'geral' ? 'Vida' : 'Carreira' });
      }
    });
  });

  const critical = allItems.filter(x => x.score <= 3).sort((a, b) => a.score - b.score);
  const growth = allItems.filter(x => x.score >= 4 && x.score <= 6).sort((a, b) => a.score - b.score);

  const critEl = document.getElementById('critical-items');
  const growthEl = document.getElementById('growth-items');

  if (critical.length === 0 && growth.length === 0) {
    critEl.innerHTML = '<span style="color:var(--text-muted);font-size:13px;">Mova os sliders para ver o diagnóstico</span>';
    growthEl.innerHTML = '<span style="color:var(--text-muted);font-size:13px;">—</span>';
    return;
  }

  critEl.innerHTML = critical.length === 0
    ? '<span style="color:var(--text-muted);font-size:13px;">Nenhuma área crítica</span>'
    : critical.map(x => `<div class="summary-item critical"><span class="name">${x.name} <small style="color:var(--text-muted)">(${x.wheel})</small></span><span class="score score-low">${x.score}</span></div>`).join('');

  growthEl.innerHTML = growth.length === 0
    ? '<span style="color:var(--text-muted);font-size:13px;">Nenhuma área nesta faixa</span>'
    : growth.map(x => `<div class="summary-item growth"><span class="name">${x.name} <small style="color:var(--text-muted)">(${x.wheel})</small></span><span class="score score-mid">${x.score}</span></div>`).join('');
}

function switchTab(key) {
  activeTab = key;
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    btn.classList.toggle('active', (i === 0 && key === 'geral') || (i === 1 && key === 'carreira'));
  });
  document.querySelectorAll('.wheel-panel').forEach(p => p.classList.remove('active'));
  document.getElementById(`panel-${key}`).classList.add('active');
  drawWheel(key);
}

function resetAll() {
  ['geral', 'carreira'].forEach(key => {
    WHEELS[key].values.fill(0);
    WHEELS[key].categories.forEach((_, i) => {
      document.getElementById(`slider-${key}-${i}`).value = 0;
      updateValue(key, i, 0);
    });
  });
}

// Init
initWheel('geral');
initWheel('carreira');

// Responsive canvas redraw
window.addEventListener('resize', () => { drawWheel('geral'); drawWheel('carreira'); });
</script>
</body>
</html>
